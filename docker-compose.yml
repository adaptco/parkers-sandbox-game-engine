services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: parkers-sandbox-game-engine:latest
    container_name: sandbox-game-engine
    ports:
      - "8200:8200"
    volumes:
      - ./:/app
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/engine/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
