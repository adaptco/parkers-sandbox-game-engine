name: Deploy Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  IMAGE_NAME: parkers-sandbox-game-engine
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run health check endpoint
        run: |
          python -c "
          from fastapi.testclient import TestClient
          from main import app
          client = TestClient(app)
          response = client.get('/engine/health')
          assert response.status_code == 200, f'Health check failed: {response.status_code}'
          assert response.json()['status'] == 'online'
          print('Health check passed')
          "

      - name: Test game engine tick endpoint
        run: |
          python -c "
          from fastapi.testclient import TestClient
          from main import app
          client = TestClient(app)
          payload = {'world_seed': 12345, 'active_entities': 10, 'physics_tick_rate': 60.0}
          response = client.post('/engine/tick', json=payload)
          assert response.status_code == 200, f'Tick endpoint failed: {response.status_code}'
          assert response.json()['status'] == 'computed'
          print('Game tick test passed')
          "

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://${{ secrets.DEPLOYMENT_URL }}/engine/health

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via Docker Compose
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
          cd /opt/sandbox-game-engine
          docker compose pull
          docker compose up -d
          docker compose exec -T web python -c "import urllib.request; urllib.request.urlopen('http://localhost:8200/engine/health')"
          echo "Deployment successful"
          EOF

      - name: Verify deployment
        run: |
          sleep 5
          curl -f http://${{ secrets.DEPLOYMENT_URL }}/engine/health || exit 1
          echo "Health check passed"
