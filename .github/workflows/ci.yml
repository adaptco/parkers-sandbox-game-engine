name: CI Pipeline

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    lint-and-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pytest httpx ruff

            - name: Lint with ruff
              run: ruff check main.py || echo "Linting warnings (non-blocking)"

            - name: Validate FastAPI syntax
              run: python -m py_compile main.py

    docker-build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: false
                  tags: parkers-sandbox:test
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    docker-test:
        runs-on: ubuntu-latest
        needs: docker-build
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build image for testing
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: false
                  load: true
                  tags: parkers-sandbox:test
                  cache-from: type=gha

            - name: Run container health check
              run: |
                  docker run -d --name sandbox-test -p 8200:8200 parkers-sandbox:test
                  sleep 3
                  curl -f http://localhost:8200/engine/health || exit 1
                  docker logs sandbox-test
                  docker stop sandbox-test

            - name: Scan image for vulnerabilities (Trivy)
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: parkers-sandbox:test
                  format: 'sarif'
                  output: 'trivy-results.sarif'

            - name: Upload Trivy results
              uses: github/codeql-action/upload-sarif@v2
              with:
                  sarif_file: 'trivy-results.sarif'
